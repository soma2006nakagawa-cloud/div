<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>避難所AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: sans-serif;
}

#debug {
  position: fixed;
  top: 10px;
  left: 10px;
  max-width: 60vw;
  background: rgba(0,0,0,.68);
  color: #00ff66;
  padding: 9px 10px;
  z-index: 9999;
  white-space: pre-line;
  font-size: 12px;
  line-height: 1.45;
  border-radius: 8px;
}

#back {
  position: fixed;
  top: 10px;
  right: 10px;
  z-index: 9999;
}

#back button {
  padding: 9px 12px;
  border: 0;
  border-radius: 8px;
  background: #e6424a;
  color: #fff;
  font-size: 14px;
  font-weight: bold;
}

/* Androidのカメラ映像を画面いっぱいに表示 */
video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  object-fit: cover !important;
  z-index: -2 !important;
  background: transparent !important;
}

/* A-Frameの描画面は透明のままカメラ映像の上に重ねる */
canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100vh !important;
  z-index: -1 !important;
  background: transparent !important;
}

.a-enter-vr,
.a-enter-ar {
  display: none !important;
}
</style>
</head>

<script>
const debug = document.getElementById("debug");

async function checkCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    stream.getTracks().forEach(track => track.stop());

    debug.textContent = "カメラ許可OK\nGPS取得待機中...";
  } catch (error) {
    debug.textContent =
      "カメラを使用できません。\n" +
      "ブラウザのサイト設定でカメラを許可してください。\n" +
      error.message;
  }
}

checkCamera();

navigator.geolocation.watchPosition(
  p => {
    debug.textContent =
`現在位置
緯度:${p.coords.latitude.toFixed(8)}
経度:${p.coords.longitude.toFixed(8)}
GPS精度:${p.coords.accuracy.toFixed(1)} m
避難所AR地点数:51件`;
  },
  e => {
    debug.textContent = "位置情報エラー: " + e.message;
  },
  {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  }
);
</script>
