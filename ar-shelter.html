<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>避難所AR</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: sans-serif;
}

#debug {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(78px + env(safe-area-inset-bottom));
  background: rgba(0,0,0,.68);
  color: #00ff66;
  padding: 10px 12px;
  z-index: 9999;
  white-space: pre-line;
  font-size: 12px;
  line-height: 1.45;
  border-radius: 12px;
  backdrop-filter: blur(6px);
}

#back {
  position: fixed;
  left: 12px;
  right: 12px;
  bottom: calc(14px + env(safe-area-inset-bottom));
  z-index: 9999;
}

#back button {
  width: 100%;
  min-height: 50px;
  padding: 12px 16px;
  border: 0;
  border-radius: 14px;
  background: #e6424a;
  color: white;
  font-size: 16px;
  font-weight: bold;
  box-shadow: 0 6px 18px rgba(0,0,0,.25);
}

/* Androidスマホ向け：映像を切り取らず画面全体に合わせる */
#arjs-video,
video {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100dvh !important;
  min-width: 100vw !important;
  min-height: 100dvh !important;
  max-width: none !important;
  max-height: none !important;
  object-fit: fill !important;
  transform: none !important;
  margin: 0 !important;
}

.a-canvas,
canvas {
  position: fixed !important;
  inset: 0 !important;
  width: 100vw !important;
  height: 100dvh !important;
}

.a-enter-vr,
.a-enter-ar {
  display: none !important;
}
</style>
</head>

<script>
const d = document.getElementById("debug");

function fitCameraVideo() {
  const video = document.querySelector("#arjs-video, video");
  if (!video) {
    requestAnimationFrame(fitCameraVideo);
    return;
  }

  video.style.setProperty("position", "fixed", "important");
  video.style.setProperty("inset", "0", "important");
  video.style.setProperty("width", "100vw", "important");
  video.style.setProperty("height", "100dvh", "important");
  video.style.setProperty("object-fit", "fill", "important");
  video.style.setProperty("transform", "none", "important");
  video.style.setProperty("margin", "0", "important");
}

window.addEventListener("load", fitCameraVideo);
window.addEventListener("resize", fitCameraVideo);
window.addEventListener("orientationchange", () => setTimeout(fitCameraVideo, 300));

navigator.geolocation.watchPosition(
  p => {
    d.textContent =
`現在位置
緯度:${p.coords.latitude.toFixed(8)}
経度:${p.coords.longitude.toFixed(8)}
GPS精度:${p.coords.accuracy.toFixed(1)} m
避難所AR地点数:51件`;
  },
  e => {
    d.textContent = "位置情報エラー: " + e.message;
  },
  {
    enableHighAccuracy: true,
    maximumAge: 0,
    timeout: 15000
  }
);
</script>
