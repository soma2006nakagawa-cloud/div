<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>最寄り避難所検索</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
    margin:0;
    font-family:"Yu Gothic",sans-serif;
    background:#eef5ff;
}

header{
    background:#1976d2;
    color:white;
    padding:15px;
    text-align:center;
}

#result{
    width:90%;
    max-width:800px;
    margin:20px auto;
    background:white;
    border-radius:10px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
}

h2{
    color:#1976d2;
}

p{
    font-size:17px;
}

button{
    background:#1976d2;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#1259a7;
}

#map{
    width:100%;
    height:450px;
    margin-top:20px;
    border-radius:10px;
}

</style>

</head>

<body>

<header>
<h1>最寄り避難所検索</h1>
</header>

<div id="result">
位置情報を取得しています...
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

function distance(lat1,lon1,lat2,lon2){

    const R=6371;

    const dLat=(lat2-lat1)*Math.PI/180;
    const dLon=(lon2-lon1)*Math.PI/180;

    const a=
    Math.sin(dLat/2)*Math.sin(dLat/2)+
    Math.cos(lat1*Math.PI/180)*
    Math.cos(lat2*Math.PI/180)*
    Math.sin(dLon/2)*
    Math.sin(dLon/2);

    return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

fetch("data.json")
.then(res=>res.json())
.then(data=>{

navigator.geolocation.getCurrentPosition(function(position){

const myLat=position.coords.latitude;
const myLng=position.coords.longitude;

let nearest=null;
let min=999999;

data.shelters.forEach(function(shelter){

const d=distance(
myLat,
myLng,
shelter.lat,
shelter.lng
);

if(d<min){

min=d;
nearest=shelter;

}

});

document.getElementById("result").innerHTML=`

<h2>${nearest.name}</h2>

<p><b>住所</b><br>${nearest.address}</p>

<p><b>収容人数</b><br>${nearest.capacity} 人</p>

<p><b>現在地からの距離</b><br>${min.toFixed(2)} km</p>

<button onclick="window.open('https://www.google.com/maps?q=${nearest.lat},${nearest.lng}','_blank')">
Googleマップで開く
</button>

<div id="map"></div>

`;

const map=L.map("map").setView([nearest.lat,nearest.lng],15);

L.tileLayer(
'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap contributors'
}
).addTo(map);

//現在地
L.circleMarker([myLat,myLng],{
radius:8,
color:"blue"
})
.addTo(map)
.bindPopup("現在地")
.openPopup();

//避難所
L.marker([nearest.lat,nearest.lng])
.addTo(map)
.bindPopup(nearest.name);

//現在地から避難所まで線
L.polyline([
[myLat,myLng],
[nearest.lat,nearest.lng]
],{
color:"red",
weight:4
}).addTo(map);

},
function(){

document.getElementById("result").innerHTML=
"位置情報が取得できません。";

});

})
.catch(function(error){

document.getElementById("result").innerHTML=
"data.jsonの読み込みに失敗しました。";

console.log(error);

});

</script>

</body>
</html>
