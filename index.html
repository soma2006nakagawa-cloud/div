<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>避難所検索システム</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

</head>

<body>

<header>

<h1>避難所検索システム</h1>

</header>

<div class="container">




<div id="nearestCard" class="card">

<h2>最寄り避難所</h2>

<div id="nearestInfo">

現在地を取得しています...

</div>

</div>
<button id="arBtn">ARモード</button>

<div id="arContainer" style="display:none;">
    <div id="debug">GPS取得待機中...</div>

    <a-scene
        vr-mode-ui="enabled:false"
        embedded
        arjs="sourceType:webcam; gpsMinDistance:5; gpsTimeInterval:1000;">

        <a-camera
            gps-camera
            rotation-reader
            camera="far:10000; near:0.1">
        </a-camera>

    </a-scene>
</div>

<div class="card">

<h2>近い避難所 TOP5</h2>

<ul id="top5">

</ul>

</div>


<div class="card">

<h2>地図</h2>

<div id="map"></div>

</div>

</div>

<script
src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js">
</script>

<script src="script.js"></script>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<script src="script.js"></script>
</body>

</html>
