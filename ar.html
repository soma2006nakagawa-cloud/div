<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>街歩きARモード</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<style>
body{
    margin:0;
    overflow:hidden;
    font-family:sans-serif;
}

#menu{
    position:fixed;
    top:10px;
    left:10px;
    z-index:9999;
}

button{
    padding:10px 18px;
    font-size:16px;
    cursor:pointer;
}

#debug{
    position:fixed;
    bottom:10px;
    left:10px;
    z-index:9999;
    color:#00ff00;
    background:rgba(0,0,0,0.7);
    padding:10px;
    border-radius:10px;
    white-space:pre-line;
}
</style>

</head>

<body>

<div id="menu">
    <button onclick="location.href='index.html'">
        ← ホームへ戻る
    </button>
</div>

<div id="debug">
GPS取得中...
</div>

<a-scene

embedded

vr-mode-ui="enabled:false"

arjs="sourceType:webcam; gpsMinDistance:5; gpsTimeInterval:1000;"

>

<a-camera

gps-camera

rotation-reader

camera="far:10000; near:0.1"

>

</a-camera>

</a-scene>

<script>

const debug=document.getElementById("debug");
const scene=document.querySelector("a-scene");

// JSON読込
fetch("data.json")

.then(res=>res.json())

.then(data=>{

    // spots をAR表示
    data.spots.forEach(spot=>{

        const box=document.createElement("a-box");

        box.setAttribute(
            "gps-entity-place",
            `latitude:${spot.lat}; longitude:${spot.lng};`
        );

        box.setAttribute("color","red");
        box.setAttribute("width","2");
        box.setAttribute("height","2");
        box.setAttribute("depth","2");

        box.setAttribute("animation",
        "property:rotation;to:0 360 0;loop:true;dur:5000");

        box.addEventListener("click",()=>{

            alert(
                spot.name+
                "\n\n"+
                spot.description
            );

        });

        scene.appendChild(box);

    });

});

// GPS表示
navigator.geolocation.watchPosition(

p=>{

debug.textContent=
`現在地

緯度:${p.coords.latitude.toFixed(7)}

経度:${p.coords.longitude.toFixed(7)}

精度:${p.coords.accuracy.toFixed(1)}m`;

},

e=>{

debug.textContent=e.message;

},

{

enableHighAccuracy:true,
maximumAge:0,
timeout:10000

}

);

</script>

</body>
</html>
