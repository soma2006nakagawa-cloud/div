<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AR避難所モード</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: sans-serif;
}

#debug {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(0,0,0,.75);
    color: #00ff00;
    padding: 10px;
    z-index: 9999;
    white-space: pre-line;
    font-size: 14px;
    border-radius: 8px;
}

#back {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
}

#back button {
    padding: 10px 16px;
    font-size: 16px;
    border: none;
    border-radius: 8px;
    background: #1976d2;
    color: white;
}

video {
    object-fit: cover !important;
    width: 100vw !important;
    height: 100vh !important;
}

video,
canvas {
  position: fixed !important;
  top: 0 !important;
  left: -5vw !important;
  width: 110vw !important;
  height: 100vh !important;
  object-fit: cover !important;
}

.a-enter-vr,
.a-enter-ar {
  display: none !important;
}

</style>
</head>

<div id="debug">GPS取得待機中...</div>
