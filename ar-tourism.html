<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>観光AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;

      padding: 10px;
      border-radius: 8px;

      background: rgba(0, 0, 0, 0.75);
      color: #00ff00;

      font-size: 13px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <div id="debug">GPS取得待機中...</div>

  <a-scene
    id="ar-scene"
    vr-mode-ui="enabled: false"
    embedded
    arjs="
      sourceType: webcam;
      gpsMinDistance: 5;
      gpsTimeInterval: 1000;
      debugUIEnabled: false;
    "
  >

    <a-camera
      gps-camera
      rotation-reader
      camera="far: 10000; near: 0.1"
    >
    </a-camera>

  </a-scene>

  <script>
    const debug = document.getElementById("debug");
    const scene = document.getElementById("ar-scene");

    let modelCreated = false;

    function createModel() {
      if (modelCreated) {
        return;
      }

      modelCreated = true;

      const model = document.createElement("a-entity");

      model.setAttribute(
        "gps-entity-place",
        "latitude:37.94367248807764; longitude:139.3323475293261;"
      );

      model.setAttribute("gltf-model", "SL.glb");
      model.setAttribute("scale", "2 2 2");
      model.setAttribute("position", "0 0 0");

      model.addEventListener("model-loaded", () => {
        debug.textContent += "\nSL.glb 読み込み成功";
      });

      model.addEventListener("model-error", event => {
        debug.textContent += "\nSL.glb 読み込み失敗";
        console.error(event.detail);
      });

      scene.appendChild(model);
    }

    navigator.geolocation.watchPosition(
      position => {
        debug.textContent =
`現在位置
緯度: ${position.coords.latitude.toFixed(8)}
経度: ${position.coords.longitude.toFixed(8)}
GPS精度: ${position.coords.accuracy.toFixed(1)} m`;

        if (!modelCreated) {
          setTimeout(createModel, 2000);
        }
      },

      error => {
        debug.textContent =
`位置情報エラー
${error.message}`;
      },

      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 15000
      }
    );
  </script>

</body>
</html>
