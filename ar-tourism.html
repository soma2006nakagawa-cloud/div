<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>新発田 観光AR</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:system-ui,-apple-system,"Yu Gothic",sans-serif}
    #arjs-video{position:fixed!important;top:50%!important;left:50%!important;width:100vw!important;height:100vh!important;min-width:100vw!important;min-height:100vh!important;object-fit:cover!important;transform:translate(-50%,-50%)!important;z-index:-2!important}
    .a-canvas{position:fixed!important;inset:0!important;width:100vw!important;height:100vh!important;z-index:-1!important}
    #status{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;right:10px;z-index:9999;padding:10px 12px;border-radius:10px;background:rgba(0,0,0,.72);color:#7cff9c;font-size:13px;line-height:1.45;white-space:pre-line;pointer-events:none}
    #nearest{position:fixed;left:10px;right:10px;bottom:max(12px,env(safe-area-inset-bottom));z-index:9999;padding:12px;border-radius:12px;background:rgba(255,255,255,.92);color:#111;font-size:14px;line-height:1.45;pointer-events:none}
    #nearest strong{display:block;margin-bottom:3px;font-size:16px}
  </style>
</head>
<body>
  <div id="status">カメラ・GPS取得待機中...</div>
  <div id="nearest"><strong>最寄りスポットを検索中</strong>位置情報を許可してください。</div>
  <a-scene id="arScene" vr-mode-ui="enabled: false" embedded arjs="sourceType: webcam; gpsMinDistance: 0; gpsTimeInterval: 1000; debugUIEnabled: false;">
    <a-camera gps-camera rotation-reader camera="near: 0.1; far: 10000"></a-camera>
  </a-scene>
  <script>
    const statusBox=document.getElementById('status');
    const nearestBox=document.getElementById('nearest');
    const scene=document.getElementById('arScene');
    const spots=[
      {name:'新発田城跡',lat:37.93963891,lng:139.326001834219947,model:'sibatazyouato.glb',scale:'2 2 2'},
      {name:'清水園',lat:37.943791,lng:139.328785,model:'kiyomizuen.glb',scale:'2 2 2'},
      {name:'蔵春閣',lat:37.94389807273562,lng:139.3317142467578,model:'zousyunkan.glb',scale:'2 2 2'},
      {name:'東公園のSL',lat:37.94367248807764,lng:139.3323475293261,model:'SL.glb',scale:'2 2 2'},
      {name:'諏訪神社',lat:37.944214,lng:139.332004,model:'uwazinnzya.glb',scale:'2 2 2'},
      {name:'新発田市役所',lat:37.947839,lng:139.327160,model:'siyakusyo.glb',scale:'2 2 2'},
      {name:'王紋酒造',lat:37.94436989072327,lng:139.33066511399528,model:'oumon.glb',scale:'2 2 2'},
      {name:'五十公野公園',lat:37.9321,lng:139.3522,model:'ikarashino_donguri_athletic.glb',scale:'2 2 2'},
      {name:'新発田駅',lat:37.9447,lng:139.3352,model:'shibata_station_ar_painted.glb',scale:'2 2 2'},
      {name:'菊水ふなぐち',lat:37.9520,lng:139.3260,model:'funaguchi.glb',scale:'2 2 2'}
    ];
    const createdModels=new Set();
    const toRad=v=>v*Math.PI/180;
    function distanceMeters(lat1,lng1,lat2,lng2){const R=6371000,dLat=toRad(lat2-lat1),dLng=toRad(lng2-lng1);const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
    const formatDistance=m=>m<1000?`${Math.round(m)} m`:`${(m/1000).toFixed(2)} km`;
    function createModel(spot){
      if(createdModels.has(spot.name))return;
      const entity=document.createElement('a-entity');
      entity.setAttribute('gps-entity-place',`latitude: ${spot.lat}; longitude: ${spot.lng};`);
      entity.setAttribute('gltf-model',spot.model);
      entity.setAttribute('scale',spot.scale);
      entity.setAttribute('rotation','0 180 0');
      entity.addEventListener('model-loaded',()=>console.log(`${spot.name} 読み込み成功`));
      entity.addEventListener('model-error',e=>console.error(`${spot.name} 読み込み失敗`,e.detail));
      scene.appendChild(entity);
      createdModels.add(spot.name);
    }
    function loadNearbyModels(latitude,longitude){
      const loadRadius=2000;
      spots.forEach(spot=>{if(distanceMeters(latitude,longitude,spot.lat,spot.lng)<=loadRadius)createModel(spot);});
    }
    function showNearest(latitude,longitude){
      const nearest=spots.map(spot=>({...spot,distance:distanceMeters(latitude,longitude,spot.lat,spot.lng)})).sort((a,b)=>a.distance-b.distance)[0];
      nearestBox.innerHTML=`<strong>最寄り：${nearest.name}</strong>距離：${formatDistance(nearest.distance)}<br>現地の方向へカメラを向けてください。`;
    }
    navigator.geolocation.watchPosition(position=>{
      const latitude=position.coords.latitude,longitude=position.coords.longitude,accuracy=position.coords.accuracy;
      loadNearbyModels(latitude,longitude);
      showNearest(latitude,longitude);
      statusBox.textContent=`GPS取得成功\n緯度：${latitude.toFixed(8)}\n経度：${longitude.toFixed(8)}\n精度：${accuracy.toFixed(1)} m\n読込モデル：${createdModels.size}件`;
    },error=>{
      statusBox.textContent=`位置情報エラー\n${error.message}\n\nカメラと位置情報を許可してください。`;
    },{enableHighAccuracy:true,maximumAge:0,timeout:15000});
  </script>
</body>
</html>
