<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>観光AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;

      padding: 10px;
      border-radius: 8px;

      background: rgba(0, 0, 0, 0.7);
      color: #00ff00;

      font-size: 12px;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <div id="debug">GPS取得待機中...</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="
      sourceType: webcam;
      gpsMinDistance: 5;
      gpsTimeInterval: 1000;
      debugUIEnabled: false;
    "
  >

    <!-- ARカメラ -->
    <a-camera
      gps-camera
      rotation-reader
      camera="
        far: 10000;
        near: 0.1;
      "
    >
    </a-camera>

    <!-- 新発田駅 -->
    <a-entity
      gps-entity-place="
        latitude: 37.94413;
        longitude: 139.33510;
      "
      gltf-model="models/shibata_station_ar_painted.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 新発田城跡 -->
    <a-entity
      gps-entity-place="
        latitude: 37.954824724542696;
        longitude: 139.326001834219947;
      "
      gltf-model="models/shibata_jyo.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 蔵春閣 -->
    <a-entity
      gps-entity-place="
        latitude: 37.94389807273562;
        longitude: 139.3317142467578;
      "
      gltf-model="models/Zousyunkaku.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 東公園のSL -->
    <a-entity
      gps-entity-place="
        latitude: 37.94367248807764;
        longitude: 139.3323475293261;
      "
      gltf-model="models/SL.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 王紋酒造 -->
    <a-entity
      gps-entity-place="
        latitude: 37.94436989072327;
        longitude: 139.33066511399528;
      "
      gltf-model="models/Oumon.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 菊水 -->
    <a-entity
      gps-entity-place="
        latitude: 37.960376479226;
        longitude: 139.35429135822383;
      "
      gltf-model="models/Funaguchi.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

    <!-- 五十公野メンチカツや -->
    <a-entity
      gps-entity-place="
        latitude: 37.93682;
        longitude: 139.34488;
      "
      gltf-model="models/Menchikatsu.glb"
      position="0 2 0"
      scale="0.1 0.1 0.1"
    >
    </a-entity>

  </a-scene>

  <script>
    const debug = document.getElementById("debug");

    navigator.geolocation.watchPosition(
      position => {
        debug.textContent =
`現在位置
緯度: ${position.coords.latitude.toFixed(8)}
経度: ${position.coords.longitude.toFixed(8)}
GPS精度: ${position.coords.accuracy.toFixed(1)} m`;
      },

      error => {
        debug.textContent =
`位置情報エラー
${error.message}`;
      },

      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      }
    );
  </script>

</body>
</html>
