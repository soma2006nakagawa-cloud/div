<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>観光ARテスト</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #debug {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      padding: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #00ff00;
      white-space: pre-line;
    }
  </style>
</head>

<body>

  <div id="debug">GPS取得待機中...</div>

  <a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="
      sourceType: webcam;
      gpsMinDistance: 5;
      gpsTimeInterval: 1000;
      debugUIEnabled: false;
    "
  >

    <a-camera
      gps-camera
      rotation-reader
      camera="far: 10000; near: 0.1"
    >
    </a-camera>

    <!-- 東公園のSL：まず1個だけ確認 -->
    <a-entity
      gps-entity-place="
        latitude: 37.94367248807764;
        longitude: 139.3323475293261;
      "
      gltf-model="models/SL.glb"
      scale="2 2 2"
    >
    </a-entity>

  </a-scene>

  <script>
    const debug = document.getElementById("debug");

    navigator.geolocation.watchPosition(
      position => {
        debug.textContent =
`現在位置
緯度: ${position.coords.latitude.toFixed(8)}
経度: ${position.coords.longitude.toFixed(8)}
GPS精度: ${position.coords.accuracy.toFixed(1)} m`;
      },

      error => {
        debug.textContent =
`位置情報エラー
${error.message}`;
      },

      {
        enableHighAccuracy: true,
        maximumAge: 0,
        timeout: 10000
      }
    );
  </script>

</body>
</html>
