<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>新発田観光AR</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
    }

    #debug{
      position:fixed;
      top:10px;
      left:10px;
      right:10px;
      z-index:9999;
      padding:10px;
      border-radius:8px;
      background:rgba(0,0,0,.72);
      color:#0f0;
      font-size:13px;
      line-height:1.45;
      white-space:pre-line;
      pointer-events:none;
    }
  </style>
</head>

<body>
  <div id="debug">GPS取得待機中...</div>

  <a-scene
    vr-mode-ui="enabled:false"
    embedded
    arjs="sourceType:webcam;gpsMinDistance:5;gpsTimeInterval:1000;debugUIEnabled:false;">

    <a-camera
      gps-camera
      rotation-reader
      camera="far:10000;near:0.1">
    </a-camera>

    <!-- 新発田城 -->
    <a-entity
      gps-entity-place="latitude:37.93963891; longitude:139.3260018342;"
      gltf-model="shibata_jyo.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

    <!-- 蔵春閣 -->
    <a-entity
      gps-entity-place="latitude:37.9438980727; longitude:139.3317142467;"
      gltf-model="Zousyunkaku.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

    <!-- 東公園のSL -->
    <a-entity
      gps-entity-place="latitude:37.9436724880; longitude:139.3323475293;"
      gltf-model="SL.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

    <!-- 王紋酒造 -->
    <a-entity
      gps-entity-place="latitude:37.9443698907; longitude:139.3306651140;"
      gltf-model="Oumon.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

    <!-- 新発田駅 -->
    <a-entity
      gps-entity-place="latitude:37.944700; longitude:139.335200;"
      gltf-model="shibata_station.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

    <!-- メンチカツ -->
    <a-entity
      gps-entity-place="latitude:37.950300; longitude:139.327600;"
      gltf-model="Menchikatsu.glb"
      scale="0.08 0.08 0.08"
      rotation="0 180 0">
    </a-entity>

  </a-scene>

  <script>
    const debug = document.getElementById("debug");

    navigator.geolocation.watchPosition(
      position => {
        debug.textContent =
`現在位置
緯度:${position.coords.latitude.toFixed(8)}
経度:${position.coords.longitude.toFixed(8)}
GPS精度:${position.coords.accuracy.toFixed(1)} m`;
      },
      error => {
        debug.textContent = "位置情報エラー: " + error.message;
      },
      {
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:15000
      }
    );
  </script>
</body>
</html>
