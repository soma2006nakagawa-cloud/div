<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"><title>新発田観光AR</title><script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script><script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script></head><body><div id="debug" style="position:fixed;top:10px;left:10px;z-index:9999;background:rgba(0,0,0,.7);color:#0f0;padding:10px">GPS取得待機中...</div><a-scene vr-mode-ui="enabled:false" embedded arjs="sourceType:webcam;gpsMinDistance:5;gpsTimeInterval:1000;"><a-camera gps-camera rotation-reader camera="far:10000;near:0.1"></a-camera><a-entity gps-entity-place="latitude:37.93963891; longitude:139.3260018342;" gltf-model="shibata_jyo.glb" scale="2 2 2"></a-entity><a-entity gps-entity-place="latitude:37.9438980727; longitude:139.3317142467;" gltf-model="Zousyunkaku.glb" scale="2 2 2"></a-entity><a-entity gps-entity-place="latitude:37.9436724880; longitude:139.3323475293;" gltf-model="SL.glb" scale="2 2 2"></a-entity><a-entity gps-entity-place="latitude:37.9443698907; longitude:139.3306651140;" gltf-model="Oumon.glb" scale="2 2 2"></a-entity><a-entity gps-entity-place="latitude:37.944700; longitude:139.335200;" gltf-model="shibata_station.glb" scale="2 2 2"></a-entity><a-entity gps-entity-place="latitude:37.950300; longitude:139.327600;" gltf-model="Menchikatsu.glb" scale="2 2 2"></a-entity></a-scene><script>const d=document.getElementById('debug');navigator.geolocation.watchPosition(p=>{d.textContent='現在位置\n緯度:'+p.coords.latitude.toFixed(8)+'\n経度:'+p.coords.longitude.toFixed(8)+'\nGPS精度:'+p.coords.accuracy.toFixed(1)+'m';},e=>d.textContent=e.message,{enableHighAccuracy:true,maximumAge:0,timeout:10000});</script></body></html>
