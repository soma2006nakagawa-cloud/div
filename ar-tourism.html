<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
  <title>観光AR モデル表示テスト</title>

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden}
    #debug{
      position:fixed;top:10px;left:10px;right:10px;z-index:9999;
      background:rgba(0,0,0,.72);color:#0f0;padding:10px;
      border-radius:8px;white-space:pre-line;font-size:13px
    }
  </style>
</head>
<body>

<div id="debug">GPS取得待機中...</div>

<a-scene
  id="scene"
  vr-mode-ui="enabled:false"
  embedded
  arjs="sourceType:webcam;gpsMinDistance:0;gpsTimeInterval:1000;debugUIEnabled:false;">

  <a-camera gps-camera rotation-reader camera="far:10000;near:0.1"></a-camera>
</a-scene>

<script>
const debug = document.getElementById("debug");
const scene = document.getElementById("scene");

const models = [
  {name:"新発田城", file:"shibata_jyo.glb", north:8, east:0},
  {name:"蔵春閣", file:"Zousyunkaku.glb", north:10, east:6},
  {name:"SL", file:"SL.glb", north:10, east:-6},
  {name:"王紋", file:"Oumon.glb", north:14, east:0},
  {name:"新発田駅", file:"shibata_station.glb", north:14, east:8},
  {name:"メンチカツ", file:"Menchikatsu.glb", north:14, east:-8}
];

let created = false;
let loaded = 0;
let failed = 0;

function offsetLatLng(lat, lng, northM, eastM){
  const dLat = northM / 111320;
  const dLng = eastM / (111320 * Math.cos(lat * Math.PI / 180));
  return {lat: lat + dLat, lng: lng + dLng};
}

function createModels(lat, lng){
  if(created) return;
  created = true;

  models.forEach((item, index) => {
    const p = offsetLatLng(lat, lng, item.north, item.east);
    const entity = document.createElement("a-entity");

    entity.setAttribute(
      "gps-entity-place",
      `latitude:${p.lat}; longitude:${p.lng};`
    );
    entity.setAttribute("gltf-model", item.file);
    entity.setAttribute("scale", "1 1 1");
    entity.setAttribute("rotation", "0 180 0");

    entity.addEventListener("model-loaded", () => {
      loaded++;
      debug.textContent += `\n読込成功: ${item.file}`;
    });

    entity.addEventListener("model-error", () => {
      failed++;
      debug.textContent += `\n読込失敗: ${item.file}`;
    });

    scene.appendChild(entity);
  });
}

navigator.geolocation.watchPosition(
  p => {
    const lat = p.coords.latitude;
    const lng = p.coords.longitude;

    debug.textContent =
`現在位置
緯度:${lat.toFixed(8)}
経度:${lng.toFixed(8)}
GPS精度:${p.coords.accuracy.toFixed(1)}m
モデルを現在地から8〜16m先へ配置します`;

    createModels(lat, lng);
  },
  e => {
    debug.textContent = "位置情報エラー: " + e.message;
  },
  {
    enableHighAccuracy:true,
    maximumAge:0,
    timeout:15000
  }
);
</script>

</body>
</html>
