<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>観光AR</title><script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script><script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script><style>body{margin:0;overflow:hidden}#debug{position:fixed;top:10px;left:10px;z-index:9999;background:#000b;color:#0f0;padding:10px}#back{position:fixed;top:10px;right:10px;z-index:9999}</style></head><body><div id="debug">観光スポット読込中...</div><div id="back"><button onclick="location.href='index.html'">← ホーム</button></div><a-scene vr-mode-ui="enabled:false" embedded arjs="sourceType:webcam;gpsMinDistance:5;gpsTimeInterval:1000;"><a-camera gps-camera rotation-reader></a-camera></a-scene><script>fetch("data.json").then(r=>r.json()).then(d=>{const s=document.querySelector("a-scene"),spots=d.spots||[];document.getElementById("debug").textContent=`観光AR地点数:${spots.length}件`;spots.forEach(p=>{const e=document.createElement("a-entity");e.setAttribute("gps-entity-place",`latitude:${p.lat}; longitude:${p.lng};`);const b=document.createElement("a-box");b.setAttribute("position","0 5 0");b.setAttribute("color","orange");b.setAttribute("scale","3 3 3");e.appendChild(b);s.appendChild(e);});});</script></body></html>
